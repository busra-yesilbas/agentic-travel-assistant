version: "3.9"

services:
  api:
    build:
      context: .
      target: runtime
    image: tripgenie:latest
    container_name: tripgenie-api
    ports:
      - "8000:8000"
    environment:
      - TRIPGENIE_ENV=production
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./data:/app/data:ro
      - ./configs:/app/configs:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  ui:
    build:
      context: .
      target: runtime
    image: tripgenie:latest
    container_name: tripgenie-ui
    command: ["streamlit", "run", "app/ui/streamlit_app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      - TRIPGENIE_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: tripgenie-network
